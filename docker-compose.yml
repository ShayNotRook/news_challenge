version: "3.9"

services:
  django:
    build: .
    container_name: django_app
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn newsletter.wsgi:application --bind 0.0.0.0:8000
      "
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis
    env_file:
      - .env

  redis:
    image: redis:7
    container_name: redis

  celery:
    build: .
    container_name: celery_worker
    command: celery -A newsletter worker --pool=solo -l info
    volumes:
      - .:/app
    depends_on:
      - redis
      - django
    env_file:
      - .env

  celery-beat:
    build: .
    container_name: celery_beat
    command: celery -A newsletter beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    depends_on:
      - redis
      - django
    env_file:
      - .env
  celery-flower:
    build: .
    container_name: celery_flower
    command: celery -A newsletter flower -l info
    volumes:
      - .:/app
    depends_on:
      - redis
      - django
    env_file:
      - .env